name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prune Next.js internal artifacts
        run: |
          find out -name '__next.*' -delete

      - name: Sync immutable assets to S3 (_next/ is hashed)
        run: |
          aws s3 sync out/_next/ s3://${{ secrets.AWS_S3_BUCKET }}/_next/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining files with short cache
        run: |
          aws s3 sync out/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --exclude "_next/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Fix content-type for extensionless image responses
        run: |
          find out -type f \( -name 'opengraph-image' -o -name 'apple-icon' -o -name 'icon' \) | while read -r f; do
            key="${f#out/}"
            aws s3 cp "$f" "s3://${{ secrets.AWS_S3_BUCKET }}/$key" \
              --content-type "image/png" \
              --cache-control "public, max-age=31536000, immutable" \
              --metadata-directive REPLACE
          done

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
